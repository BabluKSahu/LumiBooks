name: Deploy LumiBooks
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: echo "${{ secrets.GAS_CLASP_RC }}" > ~/.clasprc.json
      - run: npx clasp push -f
