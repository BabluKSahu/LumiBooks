name: Deploy LumiBooks

on:
  push:
    branches: [main]

jobs:
  # Job 1: Deploy GAS Backend
  deploy-gas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Setup clasp credentials
        run: echo '${{ secrets.GAS_CLASP_RC }}' > ~/.clasprc.json
      - name: Push to Google Apps Script
        run: npx clasp push -f

  # Job 2: Deploy Frontend to GitHub Pages
  deploy-pages:
    runs-on: ubuntu-latest
    needs: deploy-gas  # GAS deploy ke baad run karo
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Create config.js with GAS URL
        run: |
          echo "window.GAS_APP_URL = '${{ secrets.GAS_APP_URL }}';" > config.js
      
      - name: Create deployment directory
        run: |
          mkdir -p _site
          # Only copy frontend files (NOT .gs files)
          cp index.html _site/
          cp app.html _site/
          cp config.js _site/
          # portal.html is served by GAS, not GitHub Pages
      
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4
      
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
